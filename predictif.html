<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modele predictif des pannes - Sofrenor</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2330;
      --border: #293241;
      --accent: #f59e0b;
      --accent2: #3b82f6;
      --danger: #ef4444;
      --warn: #f97316;
      --ok: #22c55e;
      --text: #e6edf3;
      --muted: #8b949e;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--text); font-family: Arial, sans-serif; }
    header {
      padding: 20px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(135deg, #0d1117, #1a1f2e);
      border-bottom: 1px solid var(--border);
    }
    h1, h2, h3, p { margin: 0; }
    header h1 { font-size: 1.2rem; }
    header p { color: var(--muted); margin-top: 4px; font-size: 0.82rem; }
    .logo-zone { display: flex; align-items: center; gap: 14px; }
    .logo-badge { width: 44px; height: 44px; border-radius: 10px; display: grid; place-items: center; background: var(--accent); color: #0d1117; font-weight: 800; }
    .live-badge { border: 1px solid rgba(34, 197, 94, 0.35); color: var(--ok); border-radius: 999px; padding: 6px 12px; font-size: 0.72rem; font-weight: 800; }
    .kpi-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); }
    .kpi { background: var(--surface); padding: 18px 22px; }
    .kpi-label { color: var(--muted); text-transform: uppercase; font-size: 0.72rem; letter-spacing: 0.08em; }
    .kpi-value { font-size: 1.8rem; font-weight: 800; margin-top: 8px; }
    .danger { color: var(--danger); }
    .warn { color: var(--warn); }
    .accent { color: var(--accent); }
    .ok { color: var(--ok); }
    .main { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 134px); }
    aside { background: var(--surface); border-right: 1px solid var(--border); padding: 16px 0; }
    .sidebar-title { color: var(--muted); font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 0 16px 12px; font-weight: 800; }
    .machine-item { padding: 12px 16px; cursor: pointer; border-left: 3px solid transparent; display: grid; gap: 5px; }
    .machine-item:hover, .machine-item.active { background: var(--surface2); border-left-color: var(--accent); }
    .machine-name { font-size: 0.86rem; font-weight: 700; }
    .machine-hours { color: var(--muted); font-size: 0.74rem; }
    .risk-bar-wrap { height: 4px; background: var(--border); border-radius: 999px; overflow: hidden; }
    .risk-bar { height: 100%; }
    .content { padding: 24px; overflow: auto; }
    .section-header { display: flex; justify-content: space-between; gap: 18px; margin-bottom: 18px; }
    .machine-title { font-size: 1.5rem; font-weight: 800; }
    .machine-subtitle { color: var(--muted); margin-top: 6px; }
    .risk-badge { padding: 8px 14px; border-radius: 8px; font-weight: 800; font-size: 0.78rem; }
    .metrics-grid, .pred-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 18px; }
    .charts-row { display: grid; grid-template-columns: 1.5fr 1fr; gap: 14px; margin-bottom: 18px; }
    .metric-card, .chart-card, .pred-panel, .actions-panel, .pred-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
    .metric-label, .chart-title { color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
    .metric-value { font-size: 1.55rem; font-weight: 800; }
    .chart-wrap { height: 210px; }
    .pred-title { font-weight: 800; margin-bottom: 14px; }
    .pred-card.high { border-top: 3px solid var(--danger); }
    .pred-card.med { border-top: 3px solid var(--warn); }
    .pred-card.low { border-top: 3px solid var(--ok); }
    .pred-month { color: var(--muted); font-size: 0.75rem; text-transform: uppercase; }
    .pred-pannes { font-size: 1.2rem; font-weight: 800; margin-top: 8px; }
    .pred-reco { color: var(--muted); font-size: 0.82rem; margin-top: 10px; line-height: 1.45; }
    .action-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
    .action-item:last-child { border-bottom: 0; }
    .action-item strong { display: block; margin-bottom: 4px; }
    .action-item span { color: var(--muted); font-size: 0.86rem; }
    .type-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .type-tag { border-radius: 999px; padding: 4px 10px; font-size: 0.72rem; font-weight: 800; }
    @media (max-width: 900px) {
      .main, .kpi-strip, .metrics-grid, .pred-grid, .charts-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-zone">
      <div class="logo-badge">S</div>
      <div>
        <h1>Modele predictif des pannes</h1>
        <p>Ligne BD12KG - Analyse historique et previsions par machine</p>
      </div>
    </div>
    <div class="live-badge">DONNEES REELLES</div>
  </header>

  <div class="kpi-strip">
    <div class="kpi"><div class="kpi-label">Total interventions</div><div class="kpi-value accent">4 500</div></div>
    <div class="kpi"><div class="kpi-label">Heures d'arret cumulees</div><div class="kpi-value danger">8 535 h</div></div>
    <div class="kpi"><div class="kpi-label">MTTR moyen global</div><div class="kpi-value warn">1,90 h</div></div>
    <div class="kpi"><div class="kpi-label">Machines analysees</div><div class="kpi-value ok">12</div></div>
